name: Update DTE Circulars Data

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
    # Alternative: Run every hour (uncomment line below and comment line above)
    # - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [ main ]

jobs:
  update-circulars:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml urllib3
    
    - name: Run scraper and update data
      run: |
        # Scrape all categories
        python scraper.py --all
        
        # Create timestamp file
        echo "{\"last_updated\": \"$(date -u +"%Y-%m-%d %H:%M:%S UTC")\"}" > data/timestamp.json
        
        # Create a backup with timestamp
        cp data/latest.json "data/backup-$(date +%Y%m%d-%H%M%S).json"
    
    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
    
    - name: Commit and push changes
      run: |
        git add data/
        git add circulars.json
        
        # Only commit if there are changes
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🤖 Auto-update circulars data (30min schedule)

Updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
🔍 Latest DTE Karnataka circulars scraped automatically
📊 Data available at: data/latest.json
⏰ Updates every 30 minutes

Co-Authored-By: GitHub Actions <action@github.com>"
          
          git push
          echo "✅ Data updated successfully!"
        fi