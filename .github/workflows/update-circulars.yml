name: Update DTE Circulars Data

on:
  schedule:
    - cron: '*/30 * * * *'  # Run every 30 minutes for real-time updates
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [ main ]
    paths-ignore:
      - 'data/**'  # Don't trigger on data updates to prevent loops

permissions:
  contents: write

jobs:
  update-circulars:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Faster execution with improved scraper
    permissions:
      contents: write
      actions: read
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run scraper and update data
      timeout-minutes: 10
      run: |
        echo "🚀 Starting DTE Karnataka Circulars Scraper ($(date))..."
        
        mkdir -p data
        
        echo "🐍 Python version: $(python --version)"
        
        # Run scraper with timeout and better error handling
        echo "🔧 Running scraper..."
        echo "🌐 Testing connectivity first..."
        
        # Test basic connectivity with multiple URLs
        connectivity_ok=false
        for url in "https://dtek.karnataka.gov.in" "http://dtek.karnataka.gov.in"; do
          if curl -k -L --connect-timeout 10 --max-time 15 "$url" > /dev/null 2>&1; then
            echo "✅ $url is accessible"
            connectivity_ok=true
            break
          else
            echo "⚠️ $url connectivity issues"
          fi
        done
        
        # Set Python to ignore SSL certificates
        export PYTHONHTTPSVERIFY=0
        export CURL_CA_BUNDLE=""
        export REQUESTS_CA_BUNDLE=""
        export SSL_VERIFY=false
        
        scraper_success=false
        fallback_success=false
        
        # Try proxy scraper first (handles network restrictions)
        if timeout 300 python proxy_scraper.py; then
          echo "✅ Proxy scraper completed successfully!"
          scraped_count=$(python -c "import json; print(len(json.load(open('data/latest.json'))))" 2>/dev/null || echo "0")
          echo "📊 Proxy scraped $scraped_count circulars"
          
          if [ "$scraped_count" -gt "0" ]; then
            echo "✅ Proxy scraper found new data"
            scraper_success=true
          fi
        else
          echo "⚠️ Proxy scraper failed, trying alternatives..."
          
          # Try smart scraper (combines existing data with AI patterns)
          if timeout 180 python smart_scraper.py; then
            echo "✅ Smart scraper succeeded"
            fallback_count=$(python -c "import json; print(len(json.load(open('data/latest.json'))))" 2>/dev/null || echo "0")
            echo "📊 Smart scraper got $fallback_count circulars"
            if [ "$fallback_count" -gt "0" ]; then
              fallback_success=true
            fi
          # Try simple scraper as last resort
          elif timeout 120 python simple_scraper.py; then
            echo "✅ Simple scraper succeeded as backup"
            fallback_count=$(python -c "import json; print(len(json.load(open('data/latest.json'))))" 2>/dev/null || echo "0")
            echo "📊 Simple scraper got $fallback_count circulars"
            if [ "$fallback_count" -gt "0" ]; then
              fallback_success=true
            fi
          # Final fallback to backup data
          elif [ -f "fallback_scraper.py" ]; then
            echo "⚠️ All real scrapers failed, using backup data..."
            if timeout 60 python fallback_scraper.py; then
              echo "✅ Fallback data restored"
              fallback_count=$(python -c "import json; print(len(json.load(open('data/latest.json'))))" 2>/dev/null || echo "0")
              echo "📊 Fallback restored $fallback_count circulars"
              if [ "$fallback_count" -gt "0" ]; then
                fallback_success=true
              fi
            fi
          fi
        fi
        
        # Only create empty files if both scrapers failed
        if [ "$scraper_success" = false ] && [ "$fallback_success" = false ]; then
          echo "ℹ️ Both scrapers failed - creating empty files to prevent frontend errors"
          echo "[]" > data/latest.json
          echo "[]" > data/dvp.json
          echo "[]" > data/exam.json
          echo "[]" > data/acm.json
          echo "[]" > data/departmental.json
          echo '{"last_updated":"'$(date -u +'%Y-%m-%d %H:%M:%S UTC')'","status":"failed","circulars_count":0,"note":"Both scrapers failed"}' > data/timestamp.json
        else
          echo "✅ Data update completed successfully"
        fi
        
        echo "📁 Files in data directory:"
        ls -la data/ || echo "No data directory found"
    
    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git config --local url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
    
    - name: Commit and push changes
      run: |
        echo "Current working directory contents:"
        ls -la
        
        if [ -d "data" ]; then
          git add data/
          echo "Added data/ directory to git"
        else
          echo "No data directory found"
        fi
        
        echo "Git status before commit:"
        git status
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          echo "Committing changes..."
          git commit -m "Auto-update circulars data - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          
          echo "Pulling latest changes and rebasing..."
          git pull --rebase origin main || {
            echo "⚠️ Rebase failed, trying regular pull..."
            git pull origin main || {
              echo "⚠️ Pull failed, force pushing (this run has latest data)..."
            }
          }
          
          echo "Pushing to remote..."
          if git push; then
            echo "✅ Data updated successfully!"
          else
            echo "⚠️ Push failed - this may be due to concurrent updates"
            echo "Data will be updated on next run"
          fi
        fi