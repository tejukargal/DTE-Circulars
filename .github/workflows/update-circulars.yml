name: Update DTE Circulars Data

on:
  schedule:
    # Run every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [ main ]

jobs:
  update-circulars:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml urllib3
    
    - name: Run scraper and update data
      run: |
        python scraper.py
        
        # Move the generated JSON to data directory
        mkdir -p data
        cp circulars.json data/latest.json
        
        # Create timestamp file
        echo "{\"last_updated\": \"$(date -u +"%Y-%m-%d %H:%M:%S UTC")\"}" > data/timestamp.json
        
        # Create a backup with timestamp
        cp circulars.json "data/circulars-$(date +%Y%m%d-%H%M%S).json"
    
    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
    
    - name: Commit and push changes
      run: |
        git add data/
        git add circulars.json
        
        # Only commit if there are changes
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🤖 Auto-update circulars data

Updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
🔍 Latest DTE Karnataka circulars scraped automatically
📊 Data available at: data/latest.json

Co-Authored-By: GitHub Actions <action@github.com>"
          
          git push
          echo "✅ Data updated successfully!"
        fi