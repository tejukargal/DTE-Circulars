title: DTE Karnataka Circulars
description: Live scraping of latest government orders, circulars and notices from DTE Karnataka
url: ""
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge

# GitHub Pages settings
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Exclude files from processing
exclude:
  - "*.py"
  - "*.bat"
  - requirements.txt
  - templates/
  - "*.md"
  - Procfile
  - render.yaml